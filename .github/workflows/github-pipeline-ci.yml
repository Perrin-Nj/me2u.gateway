name: CI - Build & Test Gateway Service

on:
  pull_request:
    branches:
      - deploy
  push:
    branches:
      - deploy

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assemble

      - name: Run tests
        run: ./gradlew test