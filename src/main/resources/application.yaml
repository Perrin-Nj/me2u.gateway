server:
  port: ${PORT:8080}
spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  thread-executor: virtual

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    default-locale: en


  # Routes definition for services
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configuration:
              '[/**]':
                allowedOrigins: "*"
                allowedHeaders: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - HEAD
                  - OPTIONS
                  - PATCH
                  - TRACE
          routes:
            # --Opened routes--
            # AUTH SERVICE
            - id: auth_service_opened
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/register,/api/v1/auth/send/code,/api/v1/auth/admin/register,/api/v1/auth/admin/authenticate,/api/v1/auth/admin/send/link,/api/v1/auth/admin/password,/api/v1/auth/admin/refresh-token
                - Method=POST,GET
              filters:
                - name: CircuitBreaker
                  args:
                    name: authOpenCircuitBreaker
                    fallbackUri: forward:/fallback/auth

              # --Protected routes--
              # AUTH SERVICE
            - id: auth_service_protected
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**
              filters:
                - PrefixPath=/api
                - name: AddResponseHeader
                  args:
                    name: X-Powered-By
                    value: me2u Gateway Service
                - name: CircuitBreaker
                  args:
                    name: authCircuitBreaker
                    fallbackUri: forward:/fallback/auth

resilience4j.circuitbreaker:
  instances:
    authCircuitBreaker:
      registerHealthIndicator: true
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 3
      waitDurationInOpenState: 10s
      failureRateThreshold: 50
      eventConsumerBufferSize: 10