server:
  port: ${PORT:8090}
spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  thread-executor: virtual
  web:
    resources:
      add-mappings: false

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    default-locale: en

  # Routes definition for services
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "https://localhost:3000" # FE DOMAIN
                  - "https://admin.admindomain.com" # OTHER DOMAINS
                allowedCredentials: true
                allowedHeaders: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - HEAD
                  - OPTIONS
                  - PATCH
                  - TRACE
          routes:
            # --Opened routes--
            # AUTH SERVICE
            - id: auth_service_opened
              uri: ${AUTH_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/v1/auth/magic-link, /api/v1/auth/magic-link/verify, /api/v1/auth/refresh
                - Method=POST,GET
              filters:
                - name: CircuitBreaker
                  args:
                    name: authOpenCircuitBreaker
                    fallbackUri: forward:/fallback/auth

            # --Protected routes--
            # AUTH SERVICE
            - id: auth_service_protected
              uri: ${AUTH_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/v1/auth/logout, /api/v1/auth/refresh
              filters:
                - Authentication  # Custom JWT validation filter (matches AuthenticationGatewayFilterFactory)
                - name: AddResponseHeader
                  args:
                    name: X-Powered-By
                    value: me2u Gateway Service
                - name: CircuitBreaker
                  args:
                    name: authCircuitBreaker
                    fallbackUri: forward:/fallback/auth

resilience4j:
  circuitbreaker:
    instances:
      authCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    # Show which route predicate matches and the final route selected
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    # Show circuit breaker state transitions and call outcomes
    io.github.resilience4j.circuitbreaker.internal.CircuitBreakerStateMachine: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true